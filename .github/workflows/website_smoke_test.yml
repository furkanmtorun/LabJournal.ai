# Test whether the new website stable or not after the last commit
name: Website Smoke Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd website
          npm install

      - name: Install Playwright browsers
        run: |
          cd website
          npx playwright install --with-deps

      - name: Start rewrite server (simulates CloudFront)
        run: |
          cd website
          npm run start &
          for i in {1..15}; do
            curl -sSf http://127.0.0.1:8000 && break || sleep 1
          done

      - name: Run smoke tests
        run: |
          cd website
          npm run smoke