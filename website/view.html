<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabJournal.ai - Experiment Details</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link rel="stylesheet" href="/style.css?v=1.0" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">
</head>

<body>
  <div id="site-nav" data-hide-search="true" data-hide-new="false" data-hide-home="false"></div>

  <main class="container">
    <h4 class="page-title">Experiment Details</h4>

    <!-- Loading Spinner -->
    <div id="loading" class="center-align" style="display: none; padding: 2rem">
      <div class="preloader-wrapper big active">
        <div class="spinner-layer spinner-blue-only">
          <div class="circle-clipper left">
            <div class="circle"></div>
          </div>
          <div class="gap-patch">
            <div class="circle"></div>
          </div>
          <div class="circle-clipper right">
            <div class="circle"></div>
          </div>
        </div>
      </div>
      <p class="mt-2">Loading experiment...</p>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="card-panel red lighten-4 red-text text-darken-2"
      style="display: none; border-radius: 8px">
      <i class="material-icons left">error_outline</i>
      Could not load experiment details. <a href="../">Return to Home</a>
    </div>

    <!-- Entry Container - Result will come here -->
    <div class="entry-container" id="entry-container" style="display: none">
      <!-- Dynamic content will be populated by js.js -->
    </div>
  </main>

  <footer>
    <div class="container">
      Made and served by
      <a href="https://furkanmtorun.github.io/" target="_blank">@FurkanMTorun</a>.
    </div>
  </footer>

  <script src="/nav-footer.js"></script>
  <!-- jQuery and Materialize JS via CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  <script src="/api.js"></script>
  <script src="/js.js"></script>
  <div id="site-footer"></div>
</body>

</html>
