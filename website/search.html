<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabJournal.ai</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css" />
  <link rel="stylesheet" href="/style.css?v=1.0" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧪</text></svg>">
</head>

<body>
  <!-- Fixed Navbar with Home and New buttons -->
  <nav>
    <div class="nav-wrapper">
      <div class="nav-content">
        <!-- Left section: Title -->
        <div class="nav-left">
          <a href="../" class="brand-logo">LabJournal.ai</a>
        </div>

        <!-- Right section: Home and New buttons, and theme toggle -->
        <div class="nav-right">
          <a href="../" class="btn waves-effect waves-light nav-btn" id="home-btn">
            <i class="material-icons">home</i>
            <span>Home</span>
          </a>

          <a href="../new" class="btn waves-effect waves-light nav-btn" id="new-btn">
            <i class="material-icons">add</i>
            <span>New</span>
          </a>

          <div class="mode-toggle" id="mode-toggle">
            <i class="material-icons">brightness_6</i>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <h4 class="page-title">Semantic Search</h4>
    <h5 class="page-subtitle" id="searched_text">"Statistical analysis results for cancer positive samples"</h5>
    <p align="center">*In this search mode, the five most semantically similar experiments will be listed.</p>
    <hr>
    <div class="table-container desktop-table">
      <table class="highlight responsive-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="search-table">
          <!-- Table content will be populated by JavaScript -->
        </tbody>
      </table>
    </div>

    <footer>
      <div class="container">
        Made and served by
        <a href="https://furkanmtorun.github.io/" target="_blank">@FurkanMTorun</a>.
      </div>
    </footer>

    <!-- jQuery, Materialize JS via CDN and functionalities. -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="/api.js"></script>
    <script src="/js.js"></script>
  </main>
</body>

</html>
