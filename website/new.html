<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LabJournal.ai</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css"
    />
    <link rel="stylesheet" href="/style.css?v=1" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />
  </head>

  <body>
    <!-- Fixed Navbar with Search Bar and Home Button -->
    <nav>
      <div class="nav-wrapper">
        <div class="nav-content">
          <!-- Left section: Title -->
          <div class="nav-left">
            <a href="./" class="brand-logo">LabJournal.ai</a>
          </div>

          <!-- Right section: Home button and theme toggle -->
          <div class="nav-right">
            <a
              href="index.html"
              class="btn waves-effect waves-light home-btn"
              id="home-btn"
            >
              <i class="material-icons">home</i>
              <span>Home</span>
            </a>

            <div class="mode-toggle" id="mode-toggle">
              <i class="material-icons">brightness_6</i>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="container">
      <h4 class="page-title">Create New Experiment</h4>

      <!-- Form Container -->
      <div class="form-container">
        <form id="new-entry-form">
          <div class="row">
            <div class="input-field col s12">
              <input id="name" type="text" class="validate" required />
              <label for="name">Experiment Name</label>
            </div>
          </div>

          <div class="row">
            <div class="input-field col s12">
              <input id="category" type="text" class="validate" required />
              <label for="category">Experiment Category</label>
            </div>
          </div>

          <div class="row">
            <div class="file-field input-field col s12">
              <div class="btn">
                <span>File</span>
                <input type="file" id="file-upload" />
              </div>
              <div class="file-path-wrapper">
                <input
                  class="file-path validate"
                  type="text"
                  placeholder="Upload file"
                />
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col s12">
              <button
                class="btn waves-effect waves-light submit-btn"
                type="submit"
                name="action"
              >
                Submit
                <i class="material-icons right">send</i>
              </button>
            </div>
          </div>
        </form>
      </div>
    </main>

    <footer>
      <div class="container">
        Made and served by
        <a href="https://furkanmtorun.github.io/" target="_blank"
          >@FurkanMTorun</a
        >.
      </div>
    </footer>

    <!-- jQuery and Materialize JS via CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script src="/js.js"></script>
  </body>
</html>
