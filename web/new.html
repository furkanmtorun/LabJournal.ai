<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabJournal.ai</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
</head>

<body>
  <!-- Fixed Navbar with Search Bar and Home Button -->
  <nav>
    <div class="nav-wrapper">
      <div class="nav-content">
        <!-- Left section: Title -->
        <div class="nav-left">
          <a href="#" class="brand-logo">LabJournal.ai</a>
        </div>
        
        <!-- Right section: Home button and theme toggle -->
        <div class="nav-right">
          <a href="index.html" class="btn waves-effect waves-light home-btn" id="home-btn">
            <i class="material-icons">home</i>
            <span>Home</span>
          </a>
          
          <div class="mode-toggle" id="mode-toggle">
            <i class="material-icons">brightness_6</i>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <main class="container">
    <h4 class="page-title">Create New Project</h4>
    
    <!-- Form Container -->
    <div class="form-container">
      <form id="new-entry-form">
        <div class="row">
          <div class="input-field col s12">
            <input id="name" type="text" class="validate" required>
            <label for="name">Project Name</label>
          </div>
        </div>
        
        <div class="row">
          <div class="input-field col s12">
            <input id="category" type="text" class="validate" required>
            <label for="category">Project Category</label>
          </div>
        </div>
        
        <div class="row">
          <div class="file-field input-field col s12">
            <div class="btn">
              <span>File</span>
              <input type="file" id="file-upload">
            </div>
            <div class="file-path-wrapper">
              <input class="file-path validate" type="text" placeholder="Upload file">
            </div>
          </div>
        </div>
        
        <div class="row">
          <div class="col s12">
            <button class="btn waves-effect waves-light submit-btn" type="submit" name="action">
              Submit
              <i class="material-icons right">send</i>
            </button>
          </div>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <div class="container">
      Made and served by @furkanmtorun
    </div>
  </footer>

  <!-- jQuery and Materialize JS via CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize dropdown
      const dropdownElems = document.querySelectorAll('.dropdown-trigger');
      M.Dropdown.init(dropdownElems, {
        coverTrigger: false,
        constrainWidth: false
      });
      
      // Dark/Light mode toggle
      const modeToggle = document.getElementById('mode-toggle');
      const body = document.body;
      
      // Check for saved mode preference or respect OS preference
      const savedMode = localStorage.getItem('darkMode');
      const prefersDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedMode === 'dark' || (savedMode === null && prefersDarkMode)) {
        body.classList.add('dark-mode');
        modeToggle.querySelector('i').textContent = 'brightness_7';
      }
      
      // Toggle dark/light mode
      modeToggle.addEventListener('click', function() {
        body.classList.toggle('dark-mode');
        const isDarkMode = body.classList.contains('dark-mode');
        
        // Update icon
        this.querySelector('i').textContent = isDarkMode ? 'brightness_7' : 'brightness_6';
        
        // Save preference
        localStorage.setItem('darkMode', isDarkMode ? 'dark' : 'light');
      });
      
      // Set today's date in the date field
      const today = new Date();
      const formattedDate = today.toISOString().split('T')[0]; // Format: YYYY-MM-DD
      document.getElementById('date').value = formattedDate;
      
      // Form submission
      document.getElementById('new-entry-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const category = document.getElementById('category').value;
        const date = document.getElementById('date').value;
        const fileInput = document.getElementById('file-upload');
        const fileName = fileInput.files.length > 0 ? fileInput.files[0].name : 'No file selected';
        
        // Show success message
        M.toast({
          html: `Entry created: ${name} (${category}) - File: ${fileName}`,
          classes: 'rounded',
          displayLength: 4000
        });
        
        // In a real application, you would send this data to your server
        console.log({
          name,
          category,
          date,
          file: fileInput.files[0] || null
        });
        
        // Reset form
        this.reset();
        document.getElementById('date').value = formattedDate; // Reset date to today
      });
      
      // Initialize Materialize components
      M.AutoInit();
    });
  </script>
</body>
</html>
